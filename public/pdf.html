<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>PDF Viewer</title>
  <style>
    :root {
      --pdf-width: 1968px;
      --pdf-height: 1392px;
      --tabs-h: 46px;
      --bg: #d8d8d8;
      --panel: #ffffff;
      --text: #444444;
      --tab-bg: #ececec;
      --tab-bg-active: #ffffff;
      --tab-border: #c4c4c4;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      overflow: hidden;
      overscroll-behavior: none;
      user-select: none;
      -webkit-user-select: none;
    }
    body {
      display: grid;
      place-items: center;
      font-family: Montserrat, Arial, sans-serif;
    }
    .pdf-shell {
      width: var(--pdf-width);
      height: var(--pdf-height);
      background: var(--panel);
      box-shadow: 0 18px 60px rgba(0, 0, 0, 0.18);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tabs-bar {
      height: var(--tabs-h);
      display: flex;
      align-items: flex-end;
      gap: 2px;
      padding: 0 8px;
      background: #eaeaea;
      border-bottom: 1px solid var(--tab-border);
      overflow-x: auto;
      overflow-y: hidden;
      flex-shrink: 0;
    }
    .tabs-bar::-webkit-scrollbar { height: 4px; }
    .tab {
      height: calc(var(--tabs-h) - 6px);
      min-width: 120px;
      max-width: 240px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--tab-border);
      border-bottom: none;
      background: var(--tab-bg);
      color: #333;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      user-select: none;
      transform: translateY(0);
      animation: tabAppear 320ms ease both;
    }
    @keyframes tabAppear {
      from { opacity: 0; transform: translateY(8px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }
    .tab.active {
      background: var(--tab-bg-active);
      font-weight: 500;
      color: #111;
      position: relative;
      z-index: 1;
    }
    .tab:not(.active):hover { background: #f2f2f2; }
    .pdf-body {
      flex: 1 1 auto;
      position: relative;
      background: #fff;
    }
    #pdfFrame {
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #ffffff;
    }
    #emptyState {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      color: var(--text);
      font-size: 20px;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <main class="pdf-shell">
    <nav id="tabsBar" class="tabs-bar" aria-label="PDF tabs"></nav>
    <div class="pdf-body">
      <div id="emptyState">PDF не выбран</div>
      <iframe id="pdfFrame" title="PDF"></iframe>
    </div>
  </main>
  <script>
    const PDF_WIDTH = 1968;
    const PDF_HEIGHT = 1392;
    const PDF_ZOOM_PERCENT = 120;
    const frame = document.getElementById('pdfFrame');
    const emptyState = document.getElementById('emptyState');
    const tabsBar = document.getElementById('tabsBar');
    let currentSrc = '';
    let currentStateVersion = -1;
    let stateStream = null;
    let knownTabKeys = new Set();

    function fitWindowToPdf() {
      const TITLE_BAR_OFFSET = 32;
      const borderWidth = Math.max(0, window.outerWidth - window.innerWidth);
      const targetWidth = PDF_WIDTH + borderWidth;
      const targetHeight = PDF_HEIGHT + TITLE_BAR_OFFSET;
      const availW = window.screen?.availWidth || screen.width;
      const availH = window.screen?.availHeight || screen.height;
      const left = Math.max(0, Math.round((availW - targetWidth) / 2));
      const top = Math.max(0, Math.round((availH - PDF_HEIGHT) / 2)) - TITLE_BAR_OFFSET;
      try { window.resizeTo(targetWidth, targetHeight); } catch (_err) {}
      try { window.moveTo(left, top); } catch (_err) {}
    }

    function renderTabs(tabs, activeIndex) {
      const list = Array.isArray(tabs) ? tabs : [];
      const nextKeys = new Set(list.map((t) => t.pdfFile));
      Array.from(tabsBar.children).forEach((el) => {
        if (!nextKeys.has(el.dataset.pdf)) {
          el.remove();
          knownTabKeys.delete(el.dataset.pdf);
        }
      });
      list.forEach((tab, idx) => {
        let el = tabsBar.querySelector(`[data-pdf="${CSS.escape(tab.pdfFile)}"]`);
        if (!el) {
          el = document.createElement('button');
          el.type = 'button';
          el.className = 'tab';
          el.dataset.pdf = tab.pdfFile;
          el.textContent = tab.label || tab.pdfFile;
          el.addEventListener('click', () => activateTab(idx));
          tabsBar.appendChild(el);
          knownTabKeys.add(tab.pdfFile);
        } else {
          el.textContent = tab.label || tab.pdfFile;
        }
        el.classList.toggle('active', idx === activeIndex);
      });
    }

    async function activateTab(index) {
      try {
        await fetch('/api/pdf-window/tabs/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ index }),
        });
      } catch (_err) {}
    }

    function renderPdf(pdfFile) {
      if (!pdfFile) {
        currentSrc = '';
        frame.removeAttribute('src');
        frame.style.display = 'none';
        emptyState.style.display = 'grid';
        document.title = 'PDF Viewer';
        return;
      }
      const nextSrc = '/pdfs/' + encodeURIComponent(pdfFile).replace(/%2F/g, '/') + `#toolbar=0&navpanes=0&scrollbar=0&zoom=${PDF_ZOOM_PERCENT}`;
      if (currentSrc !== nextSrc) {
        frame.src = nextSrc;
        currentSrc = nextSrc;
      }
      frame.style.display = 'block';
      emptyState.style.display = 'none';
      document.title = pdfFile;
    }

    function applyState(state) {
      if (!state) return;
      const nextVersion = Number(state.stateVersion || 0);
      renderTabs(state.tabs || [], Number(state.activeTabIndex) || 0);
      if (nextVersion === currentStateVersion) return;
      currentStateVersion = nextVersion;
      renderPdf(String(state.pdfFile || ''));
    }

    async function refreshState() {
      try {
        const res = await fetch('/api/pdf-window/state', { cache: 'no-store' });
        const json = await res.json();
        if (!json?.ok || !json.state) return;
        applyState(json.state);
      } catch (_err) {}
    }

    function connectStateStream() {
      try {
        stateStream = new EventSource('/api/pdf-window/events');
        stateStream.addEventListener('state', (event) => {
          try {
            const payload = JSON.parse(event.data);
            applyState(payload?.state);
          } catch (_err) {}
        });
        stateStream.onerror = () => {};
      } catch (_err) {}
    }

    window.addEventListener('load', () => {
      fitWindowToPdf();
      refreshState();
      connectStateStream();
      setTimeout(fitWindowToPdf, 80);
      setTimeout(fitWindowToPdf, 220);
    });

    window.addEventListener('beforeunload', () => {
      try { stateStream && stateStream.close(); } catch (_err) {}
    });

    window.addEventListener('contextmenu', (e) => e.preventDefault());
    window.addEventListener('dragstart', (e) => e.preventDefault());
    window.addEventListener('wheel', (e) => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
    window.addEventListener('keydown', (e) => {
      if (e.key === 'F5' || e.key === 'F12' || e.key === 'F11') { e.preventDefault(); return; }
      const k = e.key.toLowerCase();
      if (e.ctrlKey && e.shiftKey && (k === 'i' || k === 'j' || k === 'c')) { e.preventDefault(); return; }
      if (e.ctrlKey && (k === 'u' || k === 'p' || k === 's' || k === 'w' || k === 'r')) { e.preventDefault(); return; }
    });
  </script>
</body>
</html>
